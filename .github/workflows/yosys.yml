name: Build and Release Yosys

on:
  # 1. Manual trigger (Can specify branch/tag/commit)
  workflow_dispatch:
    inputs:
      yosys_ref:
        description: 'Yosys branch, tag, or commit hash to build'
        required: true
        default: 'v0.58'
  # 2. Scheduled automatic update check (Every Monday at 02:00 UTC)
  schedule:
    - cron: '0 2 * * 1'
  # 3. Tag push trigger (When you push a v* tag to your repository)
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Grant permissions to create Releases and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout User Repository
        uses: actions/checkout@v4

      - name: Determine Target Version
        id: target
        run: |
          REF="master"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.yosys_ref }}"
          fi
          echo "REF=$REF" >> $GITHUB_ENV

      - name: Clone Official Yosys Repository
        run: |
          git clone https://github.com/YosysHQ/yosys.git
          cd yosys
          git checkout ${{ env.REF }}
          git submodule update --init --recursive
          # Use official Tag or Commit Hash as the version number
          VERSION=$(git describe --tags --always)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Current Yosys version to build: $VERSION"

      - name: Check for Existing Release (Avoid duplicate builds)
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a Release for this version already exists in the current repository
          if gh release view "${{ env.VERSION }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release ${{ env.VERSION }} already exists! Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Install Build Dependencies (Full compilation environment)
        if: env.SKIP_BUILD == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk git make python3 lld bison clang flex \
            libffi-dev libfl-dev libreadline-dev pkg-config tcl-dev zlib1g-dev \
            graphviz xdot build-essential cmake
          echo "Download install shell script and run it"
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Compile Yosys
        if: env.SKIP_BUILD == 'false'
        run: |
          cd yosys
          make config-gcc
          make -j$(nproc)
          # Install to staging directory using DESTDIR to ensure standard directory structure (bin/ and share/)
          make PREFIX=/usr/local DESTDIR=$PWD/staging install
          echo "print install dir"
          ls staging/usr/local


      - name: Compile Yosys-Slang Plugin
        if: env.SKIP_BUILD == 'false'
        run: |
          git clone --recursive https://github.com/povik/yosys-slang
          make -j$(nproc)
          echo "print install dir"
          ls ..
          cp -rf build/slang.so ..

