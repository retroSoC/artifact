name: Build and Release Yosys

on:
  # 1. Manual trigger (Can specify branch/tag/commit)
  workflow_dispatch:
    inputs:
      runner_version:
        description: 'runner version to build'
        required: true
        default: 'ubuntu-22.04'

      repo_version:
        description: 'repo branch, tag, or commit hash to build'
        required: true
        default: 'v0.58'
  # 2. Scheduled automatic update check (Every Monday at 02:00 UTC)
  # schedule:
  #   - cron: '0 2 * * 1'
  # 3. Tag push trigger (When you push a v* tag to your repository)
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write # Grant permissions to create Releases and upload assets

jobs:
  build-and-release:
    runs-on: ${{ github.event.inputs.runner_version }}
    steps:
      - name: Checkout User Repository
        uses: actions/checkout@v4

      - name: Determine Target Version
        id: target
        run: |
          RUNNER_VERSION="ubuntu-22.04"
          REPO_VERSION="master"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUNNER_VERSION="${{ github.event.inputs.runner_version }}"
            REPO_VERSION="${{ github.event.inputs.repo_version }}"
          fi
          echo "RUNNER_VERSION=$RUNNER_VERSION" >> $GITHUB_ENV
          echo "REPO_VERSION=$REPO_VERSION" >> $GITHUB_ENV

      - name: Clone Official Yosys Repository
        run: |
          git clone https://github.com/YosysHQ/yosys.git
          cd yosys
          git checkout ${{ env.REPO_VERSION }}
          git submodule update --init --recursive
          # Use official Tag or Commit Hash as the version number
          VERSION=$(git describe --tags --always)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Current Yosys version to build: $VERSION"

      - name: Check for Existing Release (Avoid duplicate builds)
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a Release for this version already exists in the current repository
          if gh release view "${{ env.VERSION }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release ${{ env.VERSION }} already exists! Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
            echo "PACKAGE_NAME=${{ runner.os }}-${{ env.RUNNER_VERSION }}-${{ runner.arch }}-${{ env.VERSION }}" >> $GITHUB_ENV
            echo "PACKAGE NAME: ${{ env.PACKAGE_NAME }}"
          fi

      - name: Install Build Dependencies (Full compilation environment)
        if: env.SKIP_BUILD == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk git make python3 lld bison clang flex \
            libffi-dev libfl-dev libreadline-dev pkg-config tcl-dev zlib1g-dev \
            graphviz xdot build-essential cmake
          echo "Download install shell script and run it"
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Compile Yosys
        if: env.SKIP_BUILD == 'false'
        run: |
          cd yosys
          make config-gcc
          make -j$(nproc)
          # Install to staging directory using DESTDIR to ensure standard directory structure (bin/ and share/)
          sudo make install
          yosys --version
          yosys-config --help
          make DESTDIR=$PWD/staging install
          echo "== PRINT INSTALL DIR =="
          ls staging/usr/local/bin
          ls staging/usr/local/share/yosys
          mkdir -p staging/usr/local/share/yosys/plugins
          cd ..


      - name: Compile Yosys-Slang Plugin
        if: env.SKIP_BUILD == 'false'
        run: |
          git clone --recursive https://github.com/povik/yosys-slang
          cd yosys-slang/build
          cmake ..
          make -j$(nproc)
          echo "== PRINT INSTALL DIR =="
          ls ../../yosys
          cp -rf slang.so ../../yosys/staging/usr/local/share/yosys/plugins
          ls ../../yosys/staging/usr/local/share/yosys
          ls ../../yosys/staging/usr/local/share/yosys/plugins

      - name: Package Artifacts and Generate SHA256 (Ready-to-use + Integrity verification)
        if: env.SKIP_BUILD == 'false'
        run: |
          cd yosys/staging/usr/local
          # Package files removing prefix paths; bin/yosys will be at the root after extraction
          tar -czvf ../../../${{ env.PACKAGE_NAME }}.tar.gz *
          cd ../../..
          # Generate SHA256 checksum
          sha256sum ${{ env.PACKAGE_NAME }}.tar.gz > ${{ env.PACKAGE_NAME }}.tar.gz.sha256
          echo "== PRINT CURRENT DIR =="
          ls .

      - name: Upload to Actions Artifacts(Temporary storage)
        if: env.SKIP_BUILD == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            ${{ env.PACKAGE_NAME }}.tar.gz
            ${{ env.PACKAGE_NAME }}.tar.gz.sha256
          retention-days: 90 # Retain for 90 days

      # - name: Publish to GitHub Releases (Permanent release)
      #   if: env.SKIP_BUILD == 'false'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ env.VERSION }}
      #     name: "Yosys ${{ env.VERSION }}"
      #     body: |
      #       Automated build of Yosys ${{ env.VERSION }}.

      #       **Build Commit Source:** https://github.com/YosysHQ/yosys/tree/${{ env.VERSION }}
            
      #       ### 🚀 Ready to use (How to use)
      #       1. Download `${{ env.PACKAGE_NAME }}.tar.gz`
      #       2. Extract: `tar -xzvf ${{ env.PACKAGE_NAME }}.tar.gz`
      #       3. Run: `./bin/yosys`
            
      #       *This archive has been pre-configured with relative paths for 'share'. No need to run `make install` or configure environment variables—simply extract and run.*
      #     files: |
      #       ${{ env.PACKAGE_NAME }}.tar.gz
      #       ${{ env.PACKAGE_NAME }}.tar.gz.sha256