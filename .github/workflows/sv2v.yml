name: Build and Release Sv2v

on:
  # 1. Manual trigger (Can specify branch/tag/commit)
  workflow_dispatch:
    inputs:
      runner_version:
        description: 'runner version to build'
        required: true
        default: 'ubuntu-22.04'

      repo_version:
        description: 'repo branch, tag, or commit hash to build'
        required: true
        default: 'master'

      toolchain_version:
        description: 'c compiler to build'
        required: true
        default: 'gcc'

  # 2. Scheduled automatic update check (Every Monday at 02:00 UTC)
  # schedule:
  #   - cron: '0 2 * * 1'
  # 3. Tag push trigger (When you push a v* tag to your repository)
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write # Grant permissions to create Releases and upload assets

jobs:
  build-and-release:
    runs-on: ${{ github.event.inputs.runner_version }}
    steps:
      - name: Checkout User Repository
        uses: actions/checkout@v4

      - name: Determine Target Version
        id: target
        run: |
          RUNNER_VERSION="ubuntu-22.04"
          REPO_VERSION="master"
          TOOLCHAIN_VERSION="gcc"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUNNER_VERSION="${{ github.event.inputs.runner_version }}"
            REPO_VERSION="${{ github.event.inputs.repo_version }}"
            TOOLCHAIN_VERSION="${{ github.event.inputs.toolchain_version }}"
          fi
          echo "RUNNER_VERSION=$RUNNER_VERSION" >> $GITHUB_ENV
          echo "REPO_VERSION=$REPO_VERSION" >> $GITHUB_ENV
          echo "TOOLCHAIN_VERSION=$TOOLCHAIN_VERSION" >> $GITHUB_ENV

      - name: Clone Official sv2v Repository
        run: |
          git clone https://github.com/zachjs/sv2v
          cd sv2v
          git checkout ${{ env.REPO_VERSION }}
          # Use official Tag or Commit Hash as the version number
          REPO_TAG_VERSION=$(git describe --tags --always)
          echo "REPO_TAG_VERSION=$REPO_TAG_VERSION" >> $GITHUB_ENV
          echo "Current sv2v version to build: $REPO_TAG_VERSION"

      - name: Check for Existing Release (Avoid duplicate builds)
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a Release for this version already exists in the current repository
          if gh release view "sv2v-${{ env.REPO_TAG_VERSION }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release ${{ env.REPO_TAG_VERSION }} already exists! Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
            echo "PACKAGE_NAME=sv2v-${{ env.REPO_TAG_VERSION }}-${{ env.RUNNER_VERSION }}-${{ env.TOOLCHAIN_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Install Build Dependencies (Full compilation environment)
        if: env.SKIP_BUILD == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install tree

      - name: Compile sv2v
        if: env.SKIP_BUILD == 'false'
        run: |
          cd sv2v
          make -j$(nproc)
          echo "== PRINT INSTALL DIR =="
          tree -L 4 .

      - name: Package Artifacts and Generate SHA256 (Ready-to-use + Integrity verification)
        if: env.SKIP_BUILD == 'false'
        run: |
          echo "PACKAGE NAME: ${{ env.PACKAGE_NAME }}"
          cd sv2v/bin
          # Package files removing prefix paths; bin/sv2v will be at the root after extraction
          tar -czvf ../${{ env.PACKAGE_NAME }}.tar.gz *
          cd ../
          # Generate SHA256 checksum
          sha256sum ${{ env.PACKAGE_NAME }}.tar.gz > ${{ env.PACKAGE_NAME }}.tar.gz.sha256

      - name: Upload to Actions Artifacts(Temporary storage)
        if: env.SKIP_BUILD == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            sv2v/${{ env.PACKAGE_NAME }}.tar.gz
            sv2v/${{ env.PACKAGE_NAME }}.tar.gz.sha256
          retention-days: 90 # Retain for 90 days

      - name: Publish to GitHub Releases (Permanent release)
        if: env.SKIP_BUILD == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sv2v-${{ env.REPO_TAG_VERSION }}
          name: "sv2v ${{ env.REPO_TAG_VERSION }}"
          body: |
            Automated build of sv2v ${{ env.REPO_TAG_VERSION }}.

            **Build Commit Source:** git clone https://github.com/zachjs/sv2v/tree/${{ env.REPO_TAG_VERSION }}
            
            ### 🚀 Ready to use (How to use)
            1. Download `${{ env.PACKAGE_NAME }}.tar.gz`
            2. Extract: `tar -xzvf ${{ env.PACKAGE_NAME }}.tar.gz`
            3. Run: `./bin/sv2v`
            
            *This archive has been pre-configured with relative paths for 'share'. No need to run `make install` or configure environment variables—simply extract and run.*
          files: |
            sv2v/${{ env.PACKAGE_NAME }}.tar.gz
            sv2v/${{ env.PACKAGE_NAME }}.tar.gz.sha256